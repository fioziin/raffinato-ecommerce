<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAFFINATO Admin — Preview Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <style>
    /* ── PREVIEW LAYOUT ── */
    .preview-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 48px;
      gap: 28px;
      min-height: 100vh;
      background: var(--bg);
    }

    /* ── CONTROLS BAR ── */
    .preview-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 20px;
      width: 100%;
      max-width: 680px;
    }
    .preview-controls__label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 6px;
    }
    .pv-btn {
      height: 34px;
      padding: 0 16px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      transition: border-color .2s, background .2s, color .2s;
      white-space: nowrap;
    }
    .pv-btn:hover { border-color: var(--gold-dim); background: var(--surface); }
    .pv-btn.active { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 700; }
    .pv-sep {
      width: 1px; height: 22px;
      background: var(--border);
      flex-shrink: 0;
    }
    .pv-btn--refresh {
      display: flex; align-items: center; gap: 6px;
    }
    .pv-btn--open {
      display: flex; align-items: center; gap: 6px;
      margin-left: auto;
    }

    /* ── PHONE FRAME ── */
    .phone-frame-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .phone-size-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .phone-frame {
      position: relative;
      width: 414px;
      background: #111;
      border-radius: 54px;
      box-shadow:
        0 0 0 2px #333,
        0 0 0 4px #1a1a1a,
        0 40px 80px rgba(0,0,0,0.7),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      padding: 18px 12px;
      user-select: none;
    }

    /* Dynamic Island / Notch */
    .phone-frame__notch {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .phone-frame__notch::before {
      content: '';
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
    }
    .phone-frame__notch::after {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #1c2a1c;
      box-shadow: 0 0 4px rgba(0,200,100,0.5);
    }

    /* Side buttons */
    .phone-frame__side-btn {
      position: absolute;
      background: #222;
      border-radius: 2px;
    }
    .phone-frame__side-btn--vol1 { left: -5px; top: 120px; width: 4px; height: 32px; }
    .phone-frame__side-btn--vol2 { left: -5px; top: 162px; width: 4px; height: 54px; }
    .phone-frame__side-btn--pwr  { right: -5px; top: 148px; width: 4px; height: 72px; }

    /* Screen area */
    .phone-frame__screen {
      width: 100%;
      height: 812px;
      border-radius: 42px;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    /* Status bar strip */
    .phone-frame__statusbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 52px;
      z-index: 9;
      background: transparent;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 24px 6px;
    }
    .phone-frame__statusbar-time {
      font-size: 13px; font-weight: 700; color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .phone-frame__statusbar-icons {
      display: flex; align-items: center; gap: 5px;
    }
    .phone-frame__statusbar-icons svg { color: #fff; }

    .phone-frame__iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Home indicator */
    .phone-frame__home {
      height: 5px;
      width: 134px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
      margin: 10px auto 4px;
    }

    /* Scale down on smaller screens */
    @media (max-width: 500px) {
      .phone-frame { width: 340px; transform: scale(0.9); transform-origin: top center; }
      .phone-frame__screen { height: 680px; }
    }
  </style>
</head>
<body>
<div class="admin-layout">

    <nav class="sidebar-nav">

      <a href="products.html" class="nav-item">

      <div class="nav-label">Site</div>
      <a href="../index.html" class="nav-item" target="_blank">

        Ver Site
      </a>
      <a href="mobile-preview.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="2.5" stroke-linecap="round"/></svg>

    </nav>
    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="admin-avatar" id="adminAvatar">A</div>
        <div><div class="admin-name" id="adminName">Carregando...</div><div class="admin-role">Administrador</div></div>
      </div>
      <button class="btn-logout" id="logoutBtn">Sair</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <div>
          <div class="topbar-title">Preview Mobile</div>
          <div class="topbar-sub">Visualize o site como um celular</div>
        </div>
      </div>
    </header>

    <div class="preview-main">

      <!-- CONTROLS -->
      <div class="preview-controls">
        <span class="preview-controls__label">Página</span>
        <button class="pv-btn active" data-path="">Home</button>
        <button class="pv-btn" data-path="produtos.html?genero=masculino">Masculino</button>
        <button class="pv-btn" data-path="produtos.html?genero=feminino">Feminino</button>
        <div class="pv-sep"></div>
        <button class="pv-btn pv-btn--refresh" id="btnRefresh">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
          Atualizar
        </button>
        <button class="pv-btn pv-btn--open" id="btnOpenReal">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Abrir Site Real
        </button>
      </div>

      <!-- PHONE FRAME -->
      <div class="phone-frame-wrap">
        <div class="phone-frame">
          <!-- Side buttons -->
          <div class="phone-frame__side-btn phone-frame__side-btn--vol1"></div>
          <div class="phone-frame__side-btn phone-frame__side-btn--vol2"></div>
          <div class="phone-frame__side-btn phone-frame__side-btn--pwr"></div>

          <!-- Dynamic Island -->
          <div class="phone-frame__notch"></div>

          <!-- Screen -->
          <div class="phone-frame__screen">
            <!-- Status bar (decorative) -->
            <div class="phone-frame__statusbar">
              <span class="phone-frame__statusbar-time" id="statusTime">9:41</span>
              <div class="phone-frame__statusbar-icons">
                <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><rect x="0" y="4" width="3" height="7" rx="0.5"/><rect x="4" y="2.5" width="3" height="8.5" rx="0.5"/><rect x="8" y="1" width="3" height="10" rx="0.5"/><rect x="12" y="0" width="3" height="11" rx="0.5"/></svg>
                <svg width="14" height="11" viewBox="0 0 24 18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 5.5C5.33 1.5 9.5 -0.5 12 0c2.5 0.5 6.67 2.5 11 5.5"/><path d="M4.5 9.5C7 7 9.5 5.5 12 5.5c2.5 0 5 1.5 7.5 4"/><path d="M8.5 13.5C10 12 11 11 12 11c1 0 2 1 3.5 2.5"/><circle cx="12" cy="17" r="1.5" fill="currentColor"/></svg>
                <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="0.5" y="0.5" width="20" height="11" rx="3" stroke="currentColor"/><rect x="2" y="2" width="15" height="8" rx="1.5" fill="currentColor"/><path d="M22 4.5v3a2 2 0 0 0 0-3z" fill="currentColor"/></svg>
              </div>
            </div>

            <iframe
              id="phoneIframe"
              class="phone-frame__iframe"
              title="Preview do site"
              src=""
              style="margin-top:0"
            ></iframe>
          </div>

          <!-- Home indicator -->
          <div class="phone-frame__home"></div>
        </div>

        <div class="phone-size-label" id="phoneSizeLabel">390 × 844 px</div>
      </div>

    </div><!-- /.preview-main -->
  </div>
</div>

<script src="admin.js"></script>
<script>
(function () {
  if (!Admin.requireAuth()) return;
  Admin.initSidebar();

  /* ── BASE URL: produção ou local ── */
  const BASE = (() => {
    const h = location.hostname;
    if (h === 'localhost' || h === '127.0.0.1') {
      /* apontar para o frontend local */
      return location.protocol + '//' + h + (location.port ? ':' + location.port : '') + '/..';
    }
    /* em produção, mesmo domínio */
    return location.protocol + '//' + h;
  })();

  const iframe = document.getElementById('phoneIframe');
  let currentPath = '';

  function navigate(path) {
    currentPath = path;
    const url = BASE + '/' + path;
    iframe.src = url;
    document.querySelectorAll('.pv-btn[data-path]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.path === path);
    });
    document.getElementById('btnOpenReal').dataset.url = url;
  }

  /* Botões de navegação */
  document.querySelectorAll('.pv-btn[data-path]').forEach(btn => {
    btn.addEventListener('click', () => navigate(btn.dataset.path));
  });

  document.getElementById('btnRefresh').addEventListener('click', () => {
    const url = iframe.src;
    iframe.src = '';
    setTimeout(() => { iframe.src = url; }, 50);
  });

  document.getElementById('btnOpenReal').addEventListener('click', () => {
    window.open(BASE + '/' + currentPath, '_blank');
  });

  /* Relógio da status bar */
  function tick() {
    const now = new Date();
    const h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('statusTime').textContent = h + ':' + m;
  }
  tick();
  setInterval(tick, 30000);

  /* Carga inicial */
  navigate('');
})();
</script>
</body>
