<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAFFINATO Admin — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <span>RAFFINATO</span>
      <small>Painel Administrativo</small>
    </div>
    <div class="login-card">
      <h1 class="login-title">Bem-vindo de volta</h1>
      <p class="login-sub">Faça login para acessar o painel.</p>

      <div id="loginError" class="login-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" id="email" class="form-input" placeholder="admin@raffinato.com" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn" id="loginBtn">ENTRAR</button>
      </form>
    </div>
  </div>
</div>

<script src="../config.js"></script>
<script src="admin.js"></script>
<script>
  if (Admin.getToken()) {
    window.location.href = 'dashboard.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn   = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';
    btn.textContent = 'AGUARDE...';
    btn.disabled = true;

    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    try {
      const data = await Admin.apiPost('/auth/login', { email, password });
      Admin.setToken(data.token);
      localStorage.setItem('raffinato_admin_info', JSON.stringify(data.admin));
      window.location.href = 'dashboard.html';
    } catch (err) {
      errEl.textContent = (err.data && err.data.message) || err.message || 'E-mail ou senha incorretos.';
      errEl.style.display = 'block';
      btn.textContent = 'ENTRAR';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
